name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Compile source files
        run: python -m py_compile src/intent_attention/*.py

      - name: Run tests
        run: pytest -q

      - name: Run cost model benchmark
        run: python benchmarks/bench_cost_model.py

      - name: Run CPU reference benchmark
        run: python benchmarks/bench_cpu_reference.py

      - name: Run KV quantization benchmark
        run: python benchmarks/bench_kv_quant.py

      - name: Run prefetch simulation benchmark
        run: python benchmarks/bench_prefetch.py

      - name: Run dynamic scoring benchmark
        run: python benchmarks/bench_dynamic_scoring.py

      - name: Run intent quantization benchmark
        run: python benchmarks/bench_intent_quant.py

      - name: Run IntentQuant attention benchmark
        run: python benchmarks/bench_intent_quant_attention.py

      - name: Run KV Block Router benchmark
        run: python benchmarks/bench_block_router.py

      - name: Run end-to-end router demo
        run: python examples/end_to_end_router_demo.py

      - name: Dry-run LLM quality validation
        run: python experiments/llm_quality_validation.py --dry-run

      - name: Dry-run GPU decode benchmark
        run: python experiments/gpu_decode_benchmark.py --dry-run
