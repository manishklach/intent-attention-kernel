name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Py compile check
        run: python -m py_compile src/intent_attention/*.py

      - name: Run tests
        run: pytest -q

      - name: Run cost model benchmark
        run: python benchmarks/bench_cost_model.py

      - name: Run CPU benchmark
        run: python benchmarks/bench_cpu_reference.py
